version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: medschedule
      MYSQL_USER: meduser
      MYSQL_PASSWORD: medpassword
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '8000:8000'
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=meduser
      - DB_PASSWORD=medpassword
      - DB_NAME=medschedule

volumes:
  db_data:
